<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Racer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
    }
    canvas { display: block; }

    .ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      color: white;
      font-size: 1.25rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 100;
    }

    .level { color: #ffd700; }
    .score { color: #00ff88; }
    .speed { color: #ff6b6b; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 200;
    }

    .overlay.hidden { display: none; }

    .overlay h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .overlay p {
      color: #888;
      margin-bottom: 2rem;
      text-align: center;
      line-height: 1.8;
    }

    .overlay .final-score {
      font-size: 2rem;
      color: #00ff88;
      margin-bottom: 1rem;
    }

    .overlay button {
      padding: 1rem 3rem;
      font-size: 1.25rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .overlay button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
    }

    .controls {
      font-size: 0.9rem;
      color: #666;
      margin-top: 2rem;
    }

    .back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: #666;
      text-decoration: none;
      z-index: 300;
    }
    .back:hover { color: #fff; }

    .countdown {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 40px rgba(102, 126, 234, 0.8);
      z-index: 150;
      pointer-events: none;
    }

    .countdown.hidden { display: none; }

    .mobile-controls {
      display: none;
      position: fixed;
      bottom: 2rem;
      left: 0;
      right: 0;
      justify-content: center;
      gap: 1rem;
      z-index: 100;
    }

    .mobile-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      touch-action: manipulation;
    }

    .mobile-btn:active {
      background: rgba(255,255,255,0.4);
    }

    @media (pointer: coarse) {
      .mobile-controls { display: flex; }
    }
  </style>
</head>
<body>
  <a href="/" class="back">&larr; back</a>

  <div class="ui">
    <div class="level">Level <span id="level">1</span></div>
    <div class="score">Score: <span id="score">0</span></div>
    <div class="speed"><span id="speed">80</span> mph</div>
  </div>

  <div class="countdown hidden" id="countdown">3</div>

  <div class="overlay" id="start-screen">
    <h1>Traffic Racer</h1>
    <p>Dodge traffic and survive as long as you can!<br>Each level gets faster and more intense.</p>
    <button onclick="startGame()">Start Game</button>
    <div class="controls">LEFT/RIGHT to change lanes | DOWN to brake</div>
  </div>

  <div class="overlay hidden" id="game-over">
    <h1>Game Over</h1>
    <div class="final-score">Score: <span id="final-score">0</span></div>
    <p>You reached Level <span id="final-level">1</span></p>
    <button onclick="startGame()">Play Again</button>
  </div>

  <div class="mobile-controls">
    <button class="mobile-btn" id="left-btn">&larr;</button>
    <button class="mobile-btn" id="brake-btn">&darr;</button>
    <button class="mobile-btn" id="right-btn">&rarr;</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Game state
    let scene, camera, renderer;
    let playerCar;
    let trafficCars = [];
    let trees = [];
    let cones = [];
    let people = [];
    let score = 0;
    let level = 1;
    let baseSpeed = 0.8;
    let currentSpeed = 0.8;
    let isPlaying = false;
    let isBraking = false;
    let playerLane = 1;
    let targetX = 0;
    let gameTime = 0;
    let carsActive = false;
    const laneWidth = 3.5;
    const lanes = [-laneWidth, 0, laneWidth];

    // Level configurations
    const levels = [
      { speed: 0.8, trafficDensity: 0.025, name: "City Streets" },
      { speed: 1.0, trafficDensity: 0.03, name: "Highway" },
      { speed: 1.2, trafficDensity: 0.035, name: "Rush Hour" },
      { speed: 1.4, trafficDensity: 0.04, name: "Chaos Mode" },
      { speed: 1.6, trafficDensity: 0.045, name: "Insanity" }
    ];

    function init() {
      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);
      scene.fog = new THREE.Fog(0x87ceeb, 50, 250);

      // Camera
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 8, 15);
      camera.lookAt(0, 0, -10);

      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      // Lights
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
      sunLight.position.set(50, 100, 50);
      sunLight.castShadow = true;
      sunLight.shadow.mapSize.width = 2048;
      sunLight.shadow.mapSize.height = 2048;
      scene.add(sunLight);

      // Ground
      const groundGeo = new THREE.PlaneGeometry(500, 1500);
      const groundMat = new THREE.MeshLambertMaterial({ color: 0x228b22 });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.1;
      ground.position.z = -500;
      ground.receiveShadow = true;
      scene.add(ground);

      // Sidewalks
      createSidewalks();

      // Create road
      createRoad();

      // Create player car
      createPlayerCar();

      // Create initial scenery
      for (let i = 0; i < 60; i++) {
        createTree(-250 + i * 10);
      }

      // Create cones along road
      for (let i = 0; i < 40; i++) {
        createCone(-200 + i * 12);
      }

      // Create people on sidewalk
      for (let i = 0; i < 30; i++) {
        createPerson(-200 + i * 15);
      }

      // Controls
      document.addEventListener('keydown', onKeyDown);
      document.addEventListener('keyup', onKeyUp);

      // Mobile controls
      document.getElementById('left-btn').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
      document.getElementById('right-btn').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
      document.getElementById('brake-btn').addEventListener('touchstart', (e) => { e.preventDefault(); isBraking = true; });
      document.getElementById('brake-btn').addEventListener('touchend', (e) => { e.preventDefault(); isBraking = false; });

      window.addEventListener('resize', onWindowResize);

      animate();
    }

    function createSidewalks() {
      const sidewalkGeo = new THREE.PlaneGeometry(4, 1500);
      const sidewalkMat = new THREE.MeshLambertMaterial({ color: 0x999999 });

      for (let side = -1; side <= 1; side += 2) {
        const sidewalk = new THREE.Mesh(sidewalkGeo, sidewalkMat);
        sidewalk.rotation.x = -Math.PI / 2;
        sidewalk.position.set(side * 10, 0.05, -500);
        scene.add(sidewalk);
      }
    }

    function createRoad() {
      const roadWidth = 14;

      for (let i = 0; i < 30; i++) {
        const roadGeo = new THREE.PlaneGeometry(roadWidth, 50);
        const roadMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const roadSegment = new THREE.Mesh(roadGeo, roadMat);
        roadSegment.rotation.x = -Math.PI / 2;
        roadSegment.position.z = -i * 50;
        roadSegment.receiveShadow = true;
        scene.add(roadSegment);

        // Lane markings
        for (let lane = -1; lane <= 1; lane++) {
          if (lane === 0) continue;
          for (let j = 0; j < 5; j++) {
            const markingGeo = new THREE.PlaneGeometry(0.3, 4);
            const markingMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const marking = new THREE.Mesh(markingGeo, markingMat);
            marking.rotation.x = -Math.PI / 2;
            marking.position.set(lane * laneWidth, 0.01, -i * 50 - j * 10);
            scene.add(marking);
          }
        }

        // Side lines
        for (let side = -1; side <= 1; side += 2) {
          const sideGeo = new THREE.PlaneGeometry(0.4, 50);
          const sideMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
          const sideLine = new THREE.Mesh(sideGeo, sideMat);
          sideLine.rotation.x = -Math.PI / 2;
          sideLine.position.set(side * (roadWidth / 2 - 0.5), 0.01, -i * 50);
          scene.add(sideLine);
        }
      }
    }

    function createPlayerCar() {
      playerCar = new THREE.Group();

      // Car body
      const bodyGeo = new THREE.BoxGeometry(2, 0.8, 4);
      const bodyMat = new THREE.MeshLambertMaterial({ color: 0xff4444 });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.6;
      body.castShadow = true;
      playerCar.add(body);

      // Car top
      const topGeo = new THREE.BoxGeometry(1.6, 0.6, 2);
      const topMat = new THREE.MeshLambertMaterial({ color: 0xff6666 });
      const top = new THREE.Mesh(topGeo, topMat);
      top.position.y = 1.3;
      top.position.z = -0.3;
      top.castShadow = true;
      playerCar.add(top);

      // Windshield
      const windshieldGeo = new THREE.BoxGeometry(1.5, 0.5, 0.1);
      const windshieldMat = new THREE.MeshLambertMaterial({ color: 0x88ccff, transparent: true, opacity: 0.7 });
      const windshield = new THREE.Mesh(windshieldGeo, windshieldMat);
      windshield.position.set(0, 1.2, 0.7);
      windshield.rotation.x = -0.3;
      playerCar.add(windshield);

      // Wheels
      const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
      const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
      const wheelPositions = [[-0.9, 0.4, 1.2], [0.9, 0.4, 1.2], [-0.9, 0.4, -1.2], [0.9, 0.4, -1.2]];

      wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(...pos);
        wheel.castShadow = true;
        playerCar.add(wheel);
      });

      // Headlights
      const headlightGeo = new THREE.BoxGeometry(0.4, 0.2, 0.1);
      const headlightMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
      const headlight1 = new THREE.Mesh(headlightGeo, headlightMat);
      headlight1.position.set(-0.6, 0.6, 2);
      playerCar.add(headlight1);
      const headlight2 = new THREE.Mesh(headlightGeo, headlightMat);
      headlight2.position.set(0.6, 0.6, 2);
      playerCar.add(headlight2);

      // Taillights
      const taillightMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
      const taillight1 = new THREE.Mesh(headlightGeo, taillightMat);
      taillight1.position.set(-0.6, 0.6, -2);
      playerCar.add(taillight1);
      const taillight2 = new THREE.Mesh(headlightGeo, taillightMat);
      taillight2.position.set(0.6, 0.6, -2);
      playerCar.add(taillight2);

      playerCar.position.set(0, 0, 5);
      scene.add(playerCar);
    }

    function createTrafficCar(z) {
      // Find which lanes are blocked at this z position
      const minGap = 12; // Minimum gap between cars
      const blockedLanes = new Set();

      trafficCars.forEach(car => {
        if (Math.abs(car.position.z - z) < minGap) {
          blockedLanes.add(car.userData.lane);
        }
      });

      // Find available lanes
      const availableLanes = [0, 1, 2].filter(l => !blockedLanes.has(l));

      // Don't spawn if no lanes available or if 2+ lanes blocked (ensure path exists)
      if (availableLanes.length <= 1) {
        return null;
      }

      // Pick a random available lane, but leave at least one open
      const lanesToUse = availableLanes.slice(0, availableLanes.length - 1);
      if (lanesToUse.length === 0) return null;

      const lane = lanesToUse[Math.floor(Math.random() * lanesToUse.length)];

      const car = new THREE.Group();
      const colors = [0x2244ff, 0x22ff44, 0xffff22, 0xff22ff, 0x22ffff, 0xffffff, 0x666666, 0xff8800, 0x8844ff];
      const color = colors[Math.floor(Math.random() * colors.length)];

      // Car body
      const bodyGeo = new THREE.BoxGeometry(2, 0.8, 4);
      const bodyMat = new THREE.MeshLambertMaterial({ color: color });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.6;
      body.castShadow = true;
      car.add(body);

      // Car top
      const topGeo = new THREE.BoxGeometry(1.6, 0.6, 2);
      const topMat = new THREE.MeshLambertMaterial({ color: color });
      const top = new THREE.Mesh(topGeo, topMat);
      top.position.y = 1.3;
      top.position.z = -0.3;
      top.castShadow = true;
      car.add(top);

      // Wheels
      const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
      const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
      [[-0.9, 0.4, 1.2], [0.9, 0.4, 1.2], [-0.9, 0.4, -1.2], [0.9, 0.4, -1.2]].forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(...pos);
        car.add(wheel);
      });

      // Taillights
      const taillightGeo = new THREE.BoxGeometry(0.4, 0.2, 0.1);
      const taillightMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
      [-0.6, 0.6].forEach(x => {
        const light = new THREE.Mesh(taillightGeo, taillightMat);
        light.position.set(x, 0.6, -2);
        car.add(light);
      });

      car.position.set(lanes[lane], 0, z);
      car.userData.lane = lane;
      car.userData.speed = 0.1 + Math.random() * 0.2;

      scene.add(car);
      trafficCars.push(car);
      return car;
    }

    function createCone(z) {
      const cone = new THREE.Group();

      // Cone body
      const coneGeo = new THREE.ConeGeometry(0.3, 0.8, 8);
      const coneMat = new THREE.MeshLambertMaterial({ color: 0xff6600 });
      const coneBody = new THREE.Mesh(coneGeo, coneMat);
      coneBody.position.y = 0.4;
      cone.add(coneBody);

      // White stripe
      const stripeGeo = new THREE.CylinderGeometry(0.22, 0.25, 0.15, 8);
      const stripeMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
      const stripe = new THREE.Mesh(stripeGeo, stripeMat);
      stripe.position.y = 0.5;
      cone.add(stripe);

      // Base
      const baseGeo = new THREE.BoxGeometry(0.6, 0.1, 0.6);
      const baseMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
      const base = new THREE.Mesh(baseGeo, baseMat);
      base.position.y = 0.05;
      cone.add(base);

      const side = Math.random() > 0.5 ? 1 : -1;
      cone.position.set(side * 8, 0, z);

      scene.add(cone);
      cones.push(cone);
    }

    function createPerson(z) {
      const person = new THREE.Group();

      // Body
      const bodyGeo = new THREE.CylinderGeometry(0.25, 0.3, 1, 8);
      const colors = [0x3366cc, 0xcc3366, 0x66cc33, 0xffcc00, 0xff6600, 0x9933ff];
      const bodyMat = new THREE.MeshLambertMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.8;
      person.add(body);

      // Head
      const headGeo = new THREE.SphereGeometry(0.2, 8, 8);
      const headMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.y = 1.5;
      person.add(head);

      // Legs
      const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 8);
      const legMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
      [-0.15, 0.15].forEach(x => {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(x, 0.25, 0);
        person.add(leg);
      });

      const side = Math.random() > 0.5 ? 1 : -1;
      const offset = 9.5 + Math.random() * 1.5;
      person.position.set(side * offset, 0, z);

      scene.add(person);
      people.push(person);
    }

    function createTree(z) {
      const tree = new THREE.Group();

      const trunkGeo = new THREE.CylinderGeometry(0.3, 0.4, 2, 8);
      const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.y = 1;
      trunk.castShadow = true;
      tree.add(trunk);

      const leavesGeo = new THREE.ConeGeometry(1.5, 4, 8);
      const leavesMat = new THREE.MeshLambertMaterial({ color: 0x228b22 });
      const leaves = new THREE.Mesh(leavesGeo, leavesMat);
      leaves.position.y = 4;
      leaves.castShadow = true;
      tree.add(leaves);

      const side = Math.random() > 0.5 ? 1 : -1;
      const offset = 14 + Math.random() * 12;
      tree.position.set(side * offset, 0, z);

      scene.add(tree);
      trees.push(tree);
    }

    function onKeyDown(e) {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft();
      if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight();
      if (e.code === 'ArrowDown' || e.code === 'KeyS') isBraking = true;
    }

    function onKeyUp(e) {
      if (e.code === 'ArrowDown' || e.code === 'KeyS') isBraking = false;
    }

    function moveLeft() {
      if (isPlaying && playerLane > 0) {
        playerLane--;
        targetX = lanes[playerLane];
      }
    }

    function moveRight() {
      if (isPlaying && playerLane < 2) {
        playerLane++;
        targetX = lanes[playerLane];
      }
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function startGame() {
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('game-over').classList.add('hidden');

      // Reset game state
      score = 0;
      level = 1;
      playerLane = 1;
      targetX = 0;
      playerCar.position.x = 0;
      playerCar.rotation.z = 0;
      baseSpeed = levels[0].speed;
      currentSpeed = baseSpeed;
      gameTime = 0;
      carsActive = false;

      // Clear traffic
      trafficCars.forEach(car => scene.remove(car));
      trafficCars = [];

      // Start countdown
      showCountdown(3);

      isPlaying = true;
      updateUI();
    }

    function showCountdown(num) {
      const el = document.getElementById('countdown');
      if (num > 0) {
        el.textContent = num;
        el.classList.remove('hidden');
        setTimeout(() => showCountdown(num - 1), 1000);
      } else {
        el.textContent = 'GO!';
        setTimeout(() => {
          el.classList.add('hidden');
          carsActive = true;
        }, 500);
      }
    }

    function gameOver() {
      isPlaying = false;
      document.getElementById('final-score').textContent = score;
      document.getElementById('final-level').textContent = level;
      document.getElementById('game-over').classList.remove('hidden');
    }

    function updateUI() {
      document.getElementById('score').textContent = score;
      document.getElementById('level').textContent = level;
      document.getElementById('speed').textContent = Math.floor(60 + currentSpeed * 80);
    }

    function checkCollision() {
      const playerBox = new THREE.Box3().setFromObject(playerCar);
      playerBox.min.add(new THREE.Vector3(0.3, 0, 0.4));
      playerBox.max.add(new THREE.Vector3(-0.3, 0, -0.4));

      for (const car of trafficCars) {
        const carBox = new THREE.Box3().setFromObject(car);
        if (playerBox.intersectsBox(carBox)) {
          return true;
        }
      }
      return false;
    }

    function animate() {
      requestAnimationFrame(animate);

      if (isPlaying) {
        gameTime++;
        const currentLevel = levels[Math.min(level - 1, levels.length - 1)];
        baseSpeed = currentLevel.speed;

        // Braking
        if (isBraking) {
          currentSpeed = Math.max(0.3, currentSpeed - 0.02);
        } else {
          currentSpeed += (baseSpeed - currentSpeed) * 0.05;
        }

        // Move player car smoothly
        playerCar.position.x += (targetX - playerCar.position.x) * 0.12;

        // Tilt when changing lanes
        const tiltAmount = (targetX - playerCar.position.x) * 0.08;
        playerCar.rotation.z = -tiltAmount * 0.4;

        // Move traffic
        for (let i = trafficCars.length - 1; i >= 0; i--) {
          const car = trafficCars[i];
          car.position.z += currentSpeed - car.userData.speed;

          if (car.position.z > 25) {
            scene.remove(car);
            trafficCars.splice(i, 1);
            score += 10;

            const newLevel = Math.floor(score / 200) + 1;
            if (newLevel > level && newLevel <= levels.length) {
              level = newLevel;
            }
            updateUI();
          }
        }

        // Spawn traffic (only after countdown)
        if (carsActive && Math.random() < currentLevel.trafficDensity) {
          createTrafficCar(-100 - Math.random() * 50);
        }

        // Move scenery
        const moveScenery = (arr, resetZ) => {
          arr.forEach(obj => {
            obj.position.z += currentSpeed;
            if (obj.position.z > 50) {
              obj.position.z = resetZ;
              const side = Math.random() > 0.5 ? 1 : -1;
              if (arr === trees) {
                obj.position.x = side * (14 + Math.random() * 12);
              } else if (arr === cones) {
                obj.position.x = side * 8;
              } else if (arr === people) {
                obj.position.x = side * (9.5 + Math.random() * 1.5);
              }
            }
          });
        };

        moveScenery(trees, -350);
        moveScenery(cones, -300);
        moveScenery(people, -280);

        // Check collision
        if (carsActive && checkCollision()) {
          gameOver();
        }

        // Camera follow
        camera.position.x = playerCar.position.x * 0.3;

        updateUI();
      }

      renderer.render(scene, camera);
    }

    init();
  </script>
